name: Pharma R&D CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 pharma_rd --max-line-length=120 --exclude=__pycache__ || true
